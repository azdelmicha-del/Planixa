<div style="padding:15px; border-bottom:1px solid var(--border); font-weight:bold; color: #10b981; font-size:18px;">📊 Dashboard Global</div>
<div id="adminDashView" style="display:flex; flex:1; padding:20px; overflow-y:auto; flex-direction:column; gap:20px;">
  <h3>Analíticas Visuales de la Plataforma</h3>
  <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:15px;">
    <div style="background:var(--card); padding:20px; border-radius:8px; border:1px solid var(--border); text-align:center;">
      <h4 style="color:var(--text-light); font-size:13px; margin-bottom:5px;">Total Usuarios</h4>
      <div id="dashTotalUsers" style="font-size:28px; font-weight:bold; color:var(--primary);">0</div>
    </div>
    <div style="background:var(--card); padding:20px; border-radius:8px; border:1px solid var(--border); text-align:center;">
      <h4 style="color:var(--text-light); font-size:13px; margin-bottom:5px;">Usuarios Pro (Activos)</h4>
      <div id="dashActiveUsers" style="font-size:28px; font-weight:bold; color:var(--accent);">0</div>
    </div>
    <div style="background:var(--card); padding:20px; border-radius:8px; border:1px solid var(--border); text-align:center;">
      <h4 style="color:var(--text-light); font-size:13px; margin-bottom:5px;">Ingreso Mensual Estimado</h4>
      <div id="dashMRR" style="font-size:28px; font-weight:bold; color:#f59e0b;">RD$ 0</div>
    </div>
    <div style="background:var(--card); padding:20px; border-radius:8px; border:1px solid var(--border); text-align:center;">
      <h4 style="color:var(--text-light); font-size:13px; margin-bottom:5px;">Planificaciones Generadas</h4>
      <div id="dashConversations" style="font-size:28px; font-weight:bold; color:#8b5cf6;">0</div>
    </div>
  </div>
  <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:15px; margin-top:0px;">
    <div style="background:var(--card); padding:15px; border-radius:8px; border:1px solid var(--border); text-align:center;">
      <h4 style="color:var(--text-light); font-size:12px; margin-bottom:5px;">Usuarios Gratis</h4>
      <div id="dashFreeUsers" style="font-size:24px; font-weight:bold; color:var(--text);">0</div>
    </div>
    <div style="background:var(--card); padding:15px; border-radius:8px; border:1px solid var(--border); text-align:center;">
      <h4 style="color:var(--text-light); font-size:12px; margin-bottom:5px;">Usuarios Exentos</h4>
      <div id="dashExemptUsers" style="font-size:24px; font-weight:bold; color:var(--text);">0</div>
    </div>
    <div style="background:var(--card); padding:15px; border-radius:8px; border:1px solid var(--border); text-align:center;">
      <h4 style="color:var(--text-light); font-size:12px; margin-bottom:5px;">Usuarios Admin</h4>
      <div id="dashAdminUsers" style="font-size:24px; font-weight:bold; color:var(--text);">0</div>
    </div>
  </div>
  <div style="background:var(--card); padding:20px; border-radius:8px; border:1px solid var(--border); margin-top:10px;">
    <h4 style="color:var(--text-light); font-size:14px; margin-bottom:15px; text-align:center;">Usuarios Registrados (Últimos 7 días)</h4>
    <div style="position: relative; height: 200px; width: 100%;">
      <canvas id="adminUsersChart"></canvas>
    </div>
  </div>
</div>
