<div style="padding:20px; background:var(--bg); color:var(--text); min-height:100vh;">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
    <h2 style="font-size:18px;font-weight:700;">👁️ Supervisor IA</h2>
    <div style="display:flex; align-items:center; gap:10px;">
      <span style="font-size:14px; color:var(--text-muted);">Estado del Supervisor:</span>
      <label class="switch" style="position:relative; display:inline-block; width:40px; height:20px;">
        <input type="checkbox" id="supervisorToggle" style="opacity:0; width:0; height:0;">
        <span class="slider round" style="position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background-color:#ccc; transition:.4s; border-radius:20px;"></span>
      </label>
    </div>
  </div>

  <div style="background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px;">
    <h3 style="font-size:16px; margin-bottom:15px; color:#f59e0b;">Historial de Correcciones</h3>
    <p style="font-size:13px; color:var(--text-muted); margin-bottom:20px;">Aquí se muestran los casos donde el Supervisor IA intervino para corregir un borrador del Asistente antes de ser enviado al profesor.</p>
    
    <div style="overflow-x:auto;">
      <table style="width:100%; border-collapse:collapse; font-size:13px;" id="supervisorLogsTable">
        <thead>
          <tr style="border-bottom:1px solid var(--border); text-align:left;">
            <th style="padding:10px; color:var(--text-muted);">Fecha</th>
            <th style="padding:10px; color:var(--text-muted);">Usuario</th>
            <th style="padding:10px; color:var(--text-muted);">Petición</th>
            <th style="padding:10px; color:var(--text-muted);">Borrador Original</th>
            <th style="padding:10px; color:var(--text-muted);">Corrección (Enviada)</th>
          </tr>
        </thead>
        <tbody id="supervisorLogsBody">
          <tr><td colspan="5" style="text-align:center; padding:20px;">Cargando registros...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<style>
.slider.round:before {
  position: absolute;
  content: "";
  height: 16px;
  width: 16px;
  left: 2px;
  bottom: 2px;
  background-color: white;
  transition: .4s;
  border-radius: 50%;
}
input:checked + .slider {
  background-color: #10b981;
}
input:checked + .slider:before {
  transform: translateX(20px);
}
.log-cell {
  max-width: 200px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  cursor: pointer;
}
.log-cell:hover {
  white-space: normal;
  word-wrap: break-word;
  background: var(--bg);
  position: relative;
  z-index: 10;
}
</style>

<script>
async function loadSupervisorLogs() {
  try {
    const res = await api('GET', '/api/admin/supervisor_logs');
    const toggle = document.getElementById('supervisorToggle');
    if (toggle) toggle.checked = res.enabled;
    
    const tbody = document.getElementById('supervisorLogsBody');
    if (!res.logs || res.logs.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:20px; color:var(--text-muted);">No hay correcciones registradas aún. El Asistente lo ha hecho todo perfecto o el supervisor está apagado.</td></tr>';
      return;
    }
    
    tbody.innerHTML = res.logs.map(log => `
      <tr style="border-bottom:1px solid var(--border);">
        <td style="padding:10px;">${new Date(log.date).toLocaleString()}</td>
        <td style="padding:10px;">${log.userId || 'Desconocido'}</td>
        <td style="padding:10px;" class="log-cell" title="${log.userRequest.replace(/"/g, '&quot;')}">${log.userRequest}</td>
        <td style="padding:10px; color:#ef4444;" class="log-cell" title="${log.draftResponse.replace(/"/g, '&quot;')}">${log.draftResponse}</td>
        <td style="padding:10px; color:#10b981;" class="log-cell" title="${log.correctedResponse.replace(/"/g, '&quot;')}">${log.correctedResponse}</td>
      </tr>
    `).join('');
    
  } catch (err) {
    console.error("Error cargando supervisor", err);
    document.getElementById('supervisorLogsBody').innerHTML = '<tr><td colspan="5" style="text-align:center; padding:20px; color:red;">Error cargando registros.</td></tr>';
  }
}

document.getElementById('supervisorToggle')?.addEventListener('change', async (e) => {
  const enabled = e.target.checked;
  try {
    await api('POST', '/api/admin/settings/supervisor', { enabled });
    alert(`Supervisor IA ${enabled ? 'Activado' : 'Desactivado'}`);
  } catch (err) {
    alert('Error guardando configuración');
    e.target.checked = !enabled;
  }
});

loadSupervisorLogs();
</script>
